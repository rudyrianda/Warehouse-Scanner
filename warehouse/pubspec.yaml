name: warehouse
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.1
  sqflite: ^2.3.3+1
  path: ^1.9.0
  audioplayers: ^6.4.0
  path_provider: ^2.1.5
  excel: ^4.0.6
  intl: ^0.19.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/PanasonicLogo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/ScanSound.mp3
    - assets/SuccessSound.mp3
    - assets/ErrorSound.mp3
    - assets/PanasonicLogo.png